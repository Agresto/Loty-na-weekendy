name: Refresh flight prices

# ═════════════════════════════════════════════════════════════════════════════
# Codzienne odświeżanie cen lotów z Ryanair (i Wizzair gdy zaimplementowany).
# Wynikiem jest commit data/flights.json z najnowszymi cenami.
#
# GitHub Actions cron działa w UTC. 7:00 UTC = 8:00 CET (zima) / 9:00 CEST (lato)
# ═════════════════════════════════════════════════════════════════════════════

on:
  # Codziennie o 7:00 UTC
  schedule:
    - cron: '0 7 * * *'

  # Możliwość ręcznego uruchomienia z UI GitHub
  workflow_dispatch:

  # Auto-uruchomienie po edycji skryptów (do testowania)
  push:
    paths:
      - 'scripts/refresh-flights.js'
      - 'scripts/generate-flights.js'
      - '.github/workflows/refresh-flights.yml'

# Pozwolenie na commit do repozytorium
permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📦 Checkout repozytorium
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20 (z fetch API)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔄 Pobierz najnowsze ceny lotów
        id: refresh
        run: node scripts/refresh-flights.js
        env:
          # Można dodać w przyszłości:
          # RYANAIR_API_KEY: ${{ secrets.RYANAIR_API_KEY }}
          NODE_ENV: production

      - name: 📊 Pokaż statystyki pliku
        run: |
          echo "Rozmiar pliku:"
          ls -lh data/flights.json
          echo ""
          echo "Pierwsze 5 lotów:"
          node -e "console.log(JSON.stringify(require('./data/flights.json').flights.slice(0,5), null, 2))"

      - name: 💾 Commit i push (jeśli są zmiany)
        run: |
          git config user.name  "Flight Bot"
          git config user.email "bot@lotynaweekend.pl"
          git add data/flights.json
          if git diff --staged --quiet; then
            echo "ℹ️ Brak zmian w cenach — pomijam commit"
          else
            COUNT=$(node -e "console.log(require('./data/flights.json').totalCount)")
            git commit -m "🔄 Aktualizacja cen lotów ($(date -u +%Y-%m-%d) — $COUNT lotów)"
            git push
            echo "✅ Wypchnięto zmiany do repo"
          fi
