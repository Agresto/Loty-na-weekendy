name: Refresh flight prices

# ═════════════════════════════════════════════════════════════════════════════
# Codzienne odświeżanie cen lotów z Ryanair + Wizzair.
# Wynikiem jest commit flights.json z najnowszymi cenami.
#
# GitHub Actions cron działa w UTC. 7:00 UTC = 8:00 CET (zima) / 9:00 CEST (lato)
# ═════════════════════════════════════════════════════════════════════════════

on:
  # Codziennie o 7:00 UTC
  schedule:
    - cron: '0 7 * * *'

  # Możliwość ręcznego uruchomienia z UI GitHub
  workflow_dispatch:

  # Auto-uruchomienie po edycji skryptów (do testowania)
  push:
    paths:
      - 'refresh-flights.js'
      - 'generate-flights.js'
      - '.github/workflows/refresh-flights.yml'

# Pozwolenie na commit do repozytorium
permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📦 Checkout repozytorium
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20 (z fetch API)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔄 Pobierz najnowsze ceny lotów
        id: refresh
        run: node refresh-flights.js
        env:
          NODE_ENV: production

      - name: 📊 Pokaż statystyki pliku
        run: |
          echo "Rozmiar pliku:"
          ls -lh flights.json
          echo ""
          echo "Statystyki:"
          node -e "const d=require('./flights.json');console.log('Lotów:',d.totalCount,'| Ryanair:',d.flights.filter(f=>f.airline==='ryanair').length,'| Wizzair:',d.flights.filter(f=>f.airline==='wizzair').length)"

      - name: 🔍 Upload próbek odpowiedzi API (do weryfikacji cen)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-samples-${{ github.run_number }}
          path: api-samples.json
          retention-days: 14
          if-no-files-found: ignore

      - name: 💾 Commit i push (jeśli są zmiany)
        run: |
          git config user.name  "Flight Bot"
          git config user.email "bot@lotynaweekend.pl"
          git add flights.json
          if git diff --staged --quiet; then
            echo "ℹ️ Brak zmian w cenach — pomijam commit"
          else
            COUNT=$(node -e "console.log(require('./flights.json').totalCount)")
            git commit -m "🔄 Aktualizacja cen lotów ($(date -u +%Y-%m-%d) — $COUNT lotów)"
            git push
            echo "✅ Wypchnięto zmiany do repo"
          fi
